apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketguard-ui
  namespace: marketguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketguard-ui
  template:
    metadata:
      labels:
        app: marketguard-ui
    spec:
      containers:
        - name: marketguard-ui
          image: ghcr.io/sivejozi/market-data-system-ui:7f718c85ce1c1fae7a3c19c4eb19eea8edec40b4
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"