apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketguard-ui
  namespace: marketguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketguard-ui
  template:
    metadata:
      labels:
        app: marketguard-ui
    spec:
      containers:
        - name: marketguard-ui
          image: ghcr.io/sivejozi/market-data-system-ui:71d99d9ece1cb8b7441089df7a0cafa0520418b5
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"